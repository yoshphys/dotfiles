## Setup test environment below ##################
##################################################
[[plugins]]
repo = "akinsho/bufferline.nvim"
lua_source = """
  require("bufferline").setup({
    options = {
      indicator = {
        style = "underline",
      },
      numbers = function(opts)
        return string.format("%s%s", opts.ordinal, opts.raise(opts.id))
      end,
    }
  })
"""
lua_add = """
  vim.keymap.set('n', "[Space]1", "<Cmd>BufferLineGoToBuffer 1<CR>", {silent = true})
