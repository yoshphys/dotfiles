[[plugins]]
repo = 'uga-rosa/denippet.vim'
depends = "denops.vim"
on_source = "ddc.vim"
lua_add = """
  vim.keymap.set({'i', 's'}, "<Tab>", function()
    if vim.fn["denippet#jumpable"](1) then
      return vim.fn["denippet#jump"](1)
    end
    return "<Tab>"
  end, { expr = true })

  vim.keymap.set({'i', 's'}, "<S-Tab>", function()
    if vim.fn["denippet#jumpable"](-1) then
      return vim.fn["denippet#jump"](-1)
    end
    return "<S-Tab>"
  end, { expr = true })
"""

[[plugins]]
repo = 'ryoppippi/denippet-autoimport-vscode'
depends = ["denops.vim", "friendly-snippets"]
on_event = "InsertEnter"

[[plugins]]
repo = 'rafamadriz/friendly-snippets'
on_event = "InsertEnter"

[[multiple_hooks]]
plugins = ["ddc.vim", "denippet.vim", "pum.vim"]
hook_add = """
lua << EOF
  vim.keymap.set('i', "<C-n>", function()
    if vim.fn["denippet#choosable"]() then
      return vim.fn["denippet#choice"](1)
    elseif vim.fn["pum#visible"]() then
      return vim.fn["pum#map#select_relative"](1)
    else
      vim.fn["ddc#map#manual_complete"]()
    end
  end, { expr = true })

  vim.keymap.set('i', "<C-p>", function()
    if vim.fn["denippet#choosable"]() then
      return vim.fn["denippet#choice"](-1)
    elseif vim.fn["pum#visible"]() then
      return vim.fn["pum#map#select_relative"](-1)
    else
      vim.fn["ddc#map#manual_complete"]()
    end
  end, { expr = true })
EOF
"""
hook_source = """
lua << EOF
  local Popup = {}
                                                                         
  function Popup.new()
    return setmetatable({
      nsid = vim.api.nvim_create_namespace("denippet_choice_popup"),
    }, { __index = Popup })
  end
                                                                         
  function Popup:open(node)
    self.buf = vim.api.nvim_create_buf(false, true)
    vim.api.nvim_buf_set_text(self.buf, 0, 0, 0, 0, node.items)
    local w, h = vim.lsp.util._make_floating_popup_size(node.items, {})
    self.win = vim.api.nvim_open_win(self.buf, false, {
      relative = "win",
      width = w,
      height = h,
      bufpos = { node.range.start.line, node.range.start.character },
      style = "minimal",
      border = "single",
    })
    self.extmark = vim.api.nvim_buf_set_extmark(
      self.buf,
      self.nsid,
      node.index,
      0,
      { hl_group = "incsearch", end_line = node.index + 1 }
    )
  end
                                                                         
  function Popup:update()
    vim.api.nvim_buf_del_extmark(self.buf, self.nsid, self.extmark)
    local node = vim.b.denippet_current_node
    self.extmark = vim.api.nvim_buf_set_extmark(
      self.buf,
      self.nsid,
      node.index,
      0,
      { hl_group = "incsearch", end_line = node.index + 1 }
    )
  end
                                                                         
  function Popup:close()
    if self.win then
      vim.api.nvim_win_close(self.win, true)
      self.buf = nil
      self.win = nil
      self.extmark = nil
    end
  end
                                                                         
  local popup = Popup.new()
                                                                         
  local group = vim.api.nvim_create_augroup("denippet_choice_popup", {})
  vim.api.nvim_create_autocmd("User", {
    group = group,
    pattern = "DenippetNodeEnter",
    callback = function()
      local node = vim.b.denippet_current_node
      if node and node.type == "choice" then
        vim.fn["ddc#custom#patch_global"]("ui", "none")
        popup:open(node)
      end
    end,
  })
  vim.api.nvim_create_autocmd("User", {
    group = group,
    pattern = "DenippetChoiceSelected",
    callback = function()
      popup:update()
    end,
  })
  vim.api.nvim_create_autocmd("User", {
    group = group,
    pattern = "DenippetNodeLeave",
    callback = function()
      popup:close()
      vim.fn["ddc#custom#patch_global"]("ui", "pum")
    end,
  })
EOF
"""

