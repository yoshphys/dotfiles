    if vim.fn["pum#preview_visible"]() then
      vim.fn["pum#map#scroll_preview"](4)
    end
  end)
  vim.keymap.set({'i', 'c'}, "<C-u>", function()
    if vim.fn["pum#preview_visible"]() then
      vim.fn["pum#map#scroll_preview"](-4)
    end
  end)
"""
