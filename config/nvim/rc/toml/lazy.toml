[[plugins]] # to create user modes
repo = "pogyomo/submode.nvim"
on_event = "UIEnter"
lua_source = """
  local submode = require("submode")
  submode.create("WinMove", {
      mode = "n",
      enter = "[Space]w",
      leave = { "q", "<ESC>" },
      default = function(register)
          register("h", function() vim.cmd("wincmd h") end)
          register("j", function() vim.cmd("wincmd j") end)
          register("k", function() vim.cmd("wincmd k") end)
          register("l", function() vim.cmd("wincmd l") end)
