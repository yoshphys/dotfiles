    "binary",
    "date-slash",
    "date-hyphen",
    "case",
    {
      kind = "constant",
      opts = {
        elements = { "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday", "Sunday" },
        cycle = true,
        word = true,
      },
    },
    {
      kind = "constant",
      opts = {
        elements = { "Mon", "Tue", "Wed", "Thu", "Fri", "Sat", "Sun" },
        cycle = true,
        word = true,
      },
    },
    {
      kind = "constant",
      opts = {
        elements = { "月", "火", "水", "木", "金", "土", "日" },
        cycle = true,
