[[plugins]] # auto close parentheses
repo = "cohama/lexima.vim"
on_event = "InsertEnter"
# lua_add = """
#   vim.keymap.set('i', "<CR>",
#     function()
#       if vim.fn["pum#visible"]() == 1 then
#         return vim.fn["pum#map#confirm"]()
#       else
#         return "<C-r>=lexima#expand('<LT>CR>', 'i')<CR>"
#       end
#     end,
#     {silent = true, expr = true})
# """
lua_source = '''
  vim.g.lexima_ctrlh_as_backspace = 1
  local filetypes = {
    "latex",
    "typst",
    "markdown",
  }
  vim.fn["lexima#add_rule"]({
    char = '$',
    input_after = '$',
    filetype = filetypes,
  })
  vim.fn["lexima#add_rule"]({
    char = '$',
    at = "\\%#\\$",
    leave = 1,
    filetype = filetypes,
  })
  vim.fn["lexima#add_rule"]({
    char = '<BS>',
    at = "\\$\\%#\\$",
    delete = 1,
    filetype = filetypes,
  })
  vim.fn["lexima#add_rule"]({
    char = '<CR>',
    at = "\\$\\%#\\$",
    input_after = '<CR>',
    filetype = filetypes,
  })
  vim.fn["lexima#add_rule"]({
    char = '<CR>',
    at = "\\$\\%#$",
    input_after = '<CR>',
    except = '\\C\\v^(\\s*)\\S.*%#\\n%(%(\\s*|\\1\\s.+)\\n)*\\1\\$',
    filetype = filetypes,
  })
  
  -- to avoid from inserting double space at checkbox in markdown
  vim.fn["lexima#add_rule"]({
    char = '<Space>',
    at = "\\v^\\s*\\-\\s+\\[%#].*$",
    filetype = "markdown",
  })
'''

