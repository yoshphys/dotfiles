[[plugins]] # to simplify keymaps to resize windows
repo = "pogyomo/winresize.nvim"
depends = "submode.nvim"
on_event = "UIEnter"
lua_source = """
  local submode = require("submode")
  local resize = require("winresize").resize
  submode.create("WinResize", {
      mode = "n",
      enter = "[Space]r",
      leave = { "q", "<ESC>" },
      default = function(register)
          register("h", function() resize(0, 1, "left") end)
          register("j", function() resize(0, 1, "down") end)
          register("k", function() resize(0, 1, "up") end)
          register("l", function() resize(0, 1, "right") end)
          register("H", function() resize(0, 10, "left") end)
          register("J", function() resize(0, 10, "down") end)
          register("K", function() resize(0, 10, "up") end)
          register("L", function() resize(0, 10, "right") end)
      end,
  })
"""

[[plugins]]
repo = "folke/styler.nvim"
depends = "catppuccin"
on_event = ["WinEnter"]
lua_add = """
INACTIVE_COLORSCHEME = 'catppuccin-mocha'

-- for inactive windows (including ddu floating windows)
local function inactivate(win)
  if not vim.api.nvim_win_is_valid(win) then return end
  -- skip non-ddu floating windows (e.g. completion popups)
  local cfg = vim.api.nvim_win_get_config(win)
  if cfg.relative ~= "" then
    local ft = vim.bo[vim.api.nvim_win_get_buf(win)].filetype
    if not vim.startswith(ft, "ddu-") then return end
  end
  if (vim.w[win].theme or {}).colorscheme ~= INACTIVE_COLORSCHEME then
    require('styler').set_theme(win, { colorscheme = INACTIVE_COLORSCHEME })
  end
end

vim.api.nvim_create_autocmd(
  { 'WinEnter' },
  {
    group = vim.api.nvim_create_augroup('styler-nvim-custom', {}),
    callback = function()
      vim.schedule(function()
        local win_cursor = vim.api.nvim_get_current_win()
        require('styler').clear(win_cursor)
        for _, win in ipairs(vim.api.nvim_list_wins()) do
          if win ~= win_cursor then
            inactivate(win)
          end
        end
      end)
    end
  }
)
"""

