[[multiple_hooks]] # start up an IDE like environment
plugins = ["nvim-aibo", "ddt-ui-shell"]
hook_source = """
lua << EOF
  -- Layout: [ ddt-shell | current_buffer ]
  --         [ Aibo      |                ]
  vim.api.nvim_create_user_command("AiboIDE", function(opts)

    -- Save the current buffer before ddt-shell takes over
    local orig_buf = vim.api.nvim_get_current_buf()

    -- Build the entire layout after ddt-shell opens,
    -- because ddt#start (async) may close windows created beforehand
    vim.api.nvim_create_autocmd("FileType", {
      pattern = "ddt-shell",
      once = true,
      callback = function()
        local ddt_win = vim.api.nvim_get_current_win()

        -- Create right column for the original buffer
        vim.cmd("rightbelow vsplit")
        if vim.api.nvim_buf_is_valid(orig_buf) then
          vim.api.nvim_win_set_buf(0, orig_buf)
        else
          vim.cmd("enew")
        end

        -- Back to ddt-shell; split below for Aibo
        vim.api.nvim_set_current_win(ddt_win)
        vim.cmd("belowright split")
        vim.cmd("Aibo " .. opts.args)

        -- Leave focus on ddt-shell
        vim.api.nvim_set_current_win(ddt_win)
      end,
    })

    vim.fn["ddt#start"]({
      name = "aibo-" .. tostring(vim.fn.win_getid()),
      ui = "shell",
    })
  end, { nargs = "+" })
EOF
"""
