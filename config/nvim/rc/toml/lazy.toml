[[plugins]]
repo = "nvim-treesitter/nvim-treesitter"
rev = "main"
on_event = ["BufReadPre", "CursorHold"]
hook_post_update = "TSUpdate"
lua_source = """
  local targets = {
    'bash',
    'c',
    'cpp',
    'javascript',
    'julia',
    'latex',
    'lua',
    'rust',
    'nix',
    'python',
    'toml',
    'typescript',
    'typst',
    'yaml',
    'zsh',
  }

  -- Install parsers
  require('nvim-treesitter').install(targets)

  -- Enable highlight
  vim.api.nvim_create_autocmd('FileType', {
    pattern = targets,
    callback = function()
      vim.treesitter.start()
    end,
  })

  vim.treesitter.language.register("julia", "aibo-prompt.aibo-tool-julia")
  vim.treesitter.language.register("python", "aibo-prompt.aibo-tool-python")
  vim.treesitter.language.register("markdown", "aibo-prompt.aibo-tool-claude")
"""

